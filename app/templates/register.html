{% extends "base.html" %}
{% block title %}Register &middot; Cross-Matcher{% endblock %}
{% block page_modifier %} page--narrow{% endblock %}
{% block content %}
  <div class="card">
    <h1>Register</h1>
    {% if error %}<p class="error-text">{{ error }}</p>{% endif %}
    <form action="/register" method="post">
      {% if next %}<input type="hidden" name="next" value="{{ next }}">{% endif %}
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required maxlength="72">
      </div>
      <button type="submit" class="btn btn--primary">Create account</button>
    </form>
    <p class="text-sm mt-4">Already have an account? <a href="/login">Log in</a></p>
  </div>
{% endblock %}

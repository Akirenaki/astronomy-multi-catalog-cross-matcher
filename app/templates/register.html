<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 2rem; line-height: 1.5; }
    .card { border: 1px solid #ddd; padding: 1rem; border-radius: 8px; max-width: 420px; }
    label { display: block; margin-top: 0.75rem; font-weight: bold; }
    input[type="email"], input[type="password"] { width: 100%; padding: 0.5rem; margin-top: 0.25rem; box-sizing: border-box; }
    button { padding: 0.5rem 1rem; margin-top: 1rem; }
    .error { color: #b00020; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Register</h1>
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
    <form action="/register" method="post">
      {% if next %}<input type="hidden" name="next" value="{{ next }}">{% endif %}
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required>
      <label for="password">Password</label>
      <input type="password" id="password" name="password" required maxlength="72">
      <button type="submit">Create account</button>
    </form>
    <p>Already have an account? <a href="/login">Log in</a></p>
    <p><a href="/">Back to search</a></p>
  </div>
</body>
</html>
